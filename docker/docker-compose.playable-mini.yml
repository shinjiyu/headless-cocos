services:
  cocos-preview-playable-mini:
    image: cocos-headless-preview:latest
    container_name: cocos-preview-playable-mini
    ports:
      - "7463:7463"
    volumes:
      # Copy of playableAdFramework-backup with library/ EMPTIED — everything
      # in library must be regenerated by our importers (bootSyncAssets) and
      # scripts rebuilt by the mini-packer. This is the importer e2e test.
      - "d:/tempWorkspace/playable-mini-test:/workspace"
    environment:
      PACKER: mini
      PORT: 7463
      PROJECT: /workspace
      NPM_ROOT: /app/node_modules
      UUID_UTIL: /app/vendor-utils/dist/uuid.js
      ENGINE_SNAPSHOT: /engine
      # Hash chunks against the URL Creator used when it produced this
      # project's preview import-map (the original Windows path, not the
      # container path and not the test-copy path).
      PROJECT_URL: "file:///D:/workspace/playableAdFramework-backup"
      LAUNCH_SCENE: "Main"
      WATCH_POLL: "1"
      WATCH_POLL_MS: "800"
    restart: unless-stopped
