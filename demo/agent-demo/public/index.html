<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Headless Agent Demo</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="bar">
    <div class="brand">Headless Agent Demo</div>
    <div class="meta" id="health">loading…</div>
  </header>

  <main class="layout">
    <section class="panel preview-panel">
      <div class="panel-head">
        <h1>Preview</h1>
        <a id="previewLink" href="#" target="_blank" rel="noreferrer">open ↗</a>
      </div>
      <iframe id="preview" title="cocos-preview" allow="autoplay"></iframe>
      <p class="hint">iframe → headless Docker preview. Agent edits disk only; HMR reloads this frame (no MCP).</p>
    </section>

    <section class="panel ops-panel">
      <h1>Run agent</h1>
      <label class="field">
        <span>Backend</span>
        <select id="backend">
          <option value="stub">stub (no Cursor — prove HMR)</option>
          <option value="sdk">cursor sdk (local agent, no MCP)</option>
        </select>
      </label>
      <label class="field">
        <span>Prompt</span>
        <textarea id="prompt" rows="6">Bump HeadlessProbe.PROBE_VERSION by 1 and set DEMO_LABEL to DEMO_OK. Keep the class otherwise unchanged. Do not use MCP.</textarea>
      </label>
      <div class="actions">
        <button id="runBtn" type="button">Run</button>
        <button id="reloadBtn" type="button" class="ghost">Reload preview</button>
        <button id="rescanBtn" type="button" class="ghost">Rescan logs → KB</button>
      </div>
      <div class="kb" id="kbBox">KB loading…</div>
      <pre id="log" class="log"></pre>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
